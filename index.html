<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Checker</title>
    <style>
        body{
            background-color: rgb(136, 181, 146);
            background-image: url();
        }
        .card{
            width: 350px;
            background-color: beige;
            height: 150px;
            text-align: center;
            padding: 10px;
            margin: 20px auto;
            margin-top: 300px;
            border-radius: 20px;
        }
        .a{
            color: rgb(78, 78, 247);
        }
    </style>
</head>
<body>
    <div class="card">
    <h2 class="a">Password Strength Checker</h2>
     <input type="password" id="password" placeholder="Enter the password" onkeyup="checkPassword()"> 
    <h3 id="message"></h3>
    </div>


    <script>
        function checkPassword(){
            let pwd=document.getElementById("password").value;
            let message=document.getElementById("message");

            if(pwd.length===0){
                message.innerText="";

            }
            else if(pwd.length<5){
                message.innerText="Weak Password";
                message.style.color="red";

            }else if(pwd.length>=5 && pwd.length<8){
                message.innerText="Medium Password";
                message.style.color="orange";
            }else{
                message.innerText="Strong Password";
                message.style.color="green";
            }
        }
    </script>
</body>
</html>
